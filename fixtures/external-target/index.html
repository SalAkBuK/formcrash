<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>External FormCrash fixture</title>
    <style>
      body {
        max-width: 42rem;
        margin: 3rem auto;
        padding: 0 1rem;
        font: 16px/1.5 system-ui;
      }
      form,
      fieldset,
      .auth-panel {
        display: grid;
        gap: 1rem;
      }
      label {
        display: grid;
        gap: 0.25rem;
      }
      .auth-panel,
      .complete {
        border: 2px solid #27833d;
        margin-bottom: 1rem;
        padding: 1rem;
      }
      .error {
        border-color: #a32929;
      }
      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>External profile fixture</h1>
      <section class="auth-panel" data-testid="auth-panel">
        <strong>Fixture authentication</strong>
        <span id="auth-status">Signed out</span>
        <button data-testid="login" type="button">Sign in to fixture</button>
      </section>
      <a data-testid="details-link" href="/details">Open profile form</a>
      <form data-testid="profile-form">
        <label for="display-name">Display name</label>
        <input
          id="display-name"
          data-formcrash="display-name"
          name="displayName"
        />

        <label for="email">Unique email</label>
        <input id="email" data-testid="email" name="email" type="email" />

        <label for="run-id">Run ID</label>
        <input id="run-id" data-testid="run-id" name="runId" />

        <label for="password">Temporary password</label>
        <input id="password" name="password" type="password" />

        <label for="plan">Plan</label>
        <select id="plan" data-testid="plan-select" name="plan">
          <option value="starter">Starter</option>
          <option value="team">Team</option>
        </select>

        <label
          ><input data-testid="terms" name="terms" type="checkbox" /> Accept
          fixture terms</label
        >
        <button data-testid="save-profile" type="submit">Save profile</button>
      </form>
      <section id="complete" class="complete" hidden>
        <strong>Profile fixture completed.</strong>
        <span id="created-count"></span>
      </section>
      <section id="request-error" class="auth-panel error" hidden></section>

      <input id="upload" type="file" />
      <div id="editor" contenteditable="true">Unsupported editor</div>
      <div id="shadow-host"></div>
      <iframe
        title="fixture frame"
        srcdoc="<button id='frame-button'>Iframe action</button>"
      ></iframe>
    </main>
    <script>
      const parameters = new URLSearchParams(window.location.search);
      const mode = parameters.get('mode') === 'fixed' ? 'fixed' : 'vulnerable';
      const requiresAuthentication = parameters.get('auth') === 'required';
      let signedIn = !requiresAuthentication;
      let localCreatedCount = 0;
      let fixedInFlight = false;
      const form = document.querySelector('form');
      const authStatus = document.querySelector('#auth-status');

      function renderAuthentication() {
        authStatus.textContent = signedIn ? 'Signed in' : 'Signed out';
        form.hidden = !signedIn;
      }

      async function refreshAuthentication() {
        if (!requiresAuthentication) return renderAuthentication();
        try {
          const response = await fetch('/api/session', {
            credentials: 'same-origin',
          });
          const payload = await response.json();
          signedIn = payload.authenticated === true;
        } catch {
          signedIn = false;
        }
        renderAuthentication();
      }

      document
        .querySelector('[data-testid="login"]')
        .addEventListener('click', async () => {
          const response = await fetch('/api/login', {
            method: 'POST',
            credentials: 'same-origin',
          });
          signedIn = response.ok;
          renderAuthentication();
        });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        if (mode === 'fixed' && fixedInFlight) return;
        if (mode === 'fixed') fixedInFlight = true;
        const fields = new FormData(form);
        const body = {
          displayName: fields.get('displayName'),
          email: fields.get('email'),
          runId: fields.get('runId'),
          plan: fields.get('plan'),
          mode,
        };
        try {
          const response = await fetch('/api/profile', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const payload = await response.json();
          document.querySelector('#created-count').textContent =
            `Created records: ${payload.createdCount}`;
          form.hidden = true;
          document.querySelector('#complete').hidden = false;
        } catch (error) {
          // Preserve the Chunk 5 path when this HTML is hosted without APIs.
          if (!requiresAuthentication) {
            localCreatedCount += 1;
            document.querySelector('#created-count').textContent =
              `Created records: ${localCreatedCount}`;
            form.hidden = true;
            document.querySelector('#complete').hidden = false;
          } else {
            const target = document.querySelector('#request-error');
            target.textContent = `Request failed: ${error.message}`;
            target.hidden = false;
          }
        } finally {
          if (mode === 'fixed') fixedInFlight = false;
        }
      });

      const root = document
        .querySelector('#shadow-host')
        .attachShadow({ mode: 'open' });
      root.innerHTML = '<button id="shadow-button">Shadow action</button>';
      void refreshAuthentication();
    </script>
  </body>
</html>
